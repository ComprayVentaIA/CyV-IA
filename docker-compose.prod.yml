# Entorno de producción
# Uso: docker-compose -f docker-compose.prod.yml up -d
version: '3.9'

services:
  # ── Base de datos ──────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: cyv-postgres
    env_file: .env.prod
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER} -d ${DB_NAME}']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512m

  # ── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: cyv-redis
    command: redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', '${REDIS_PASSWORD}', 'ping']
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - internal
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 192m

  # ── Backend NestJS ─────────────────────────────────────────────────────────
  backend:
    image: ghcr.io/${GITHUB_REPO}/cyv-backend:${IMAGE_TAG:-latest}
    container_name: cyv-backend
    env_file: .env.prod
    environment:
      NODE_ENV: production
      DB_HOST: postgres
      DB_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512m
    logging:
      driver: 'json-file'
      options:
        max-size: '10m'
        max-file: '5'

  # ── Frontend (nginx) ───────────────────────────────────────────────────────
  frontend:
    image: ghcr.io/${GITHUB_REPO}/cyv-frontend:${IMAGE_TAG:-latest}
    container_name: cyv-frontend
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./ssl:/etc/nginx/ssl:ro
      - certbot_data:/var/www/certbot:ro
    depends_on:
      - backend
    networks:
      - internal
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128m
    logging:
      driver: 'json-file'
      options:
        max-size: '5m'
        max-file: '3'

volumes:
  postgres_data:
  redis_data:
  certbot_data:

networks:
  internal:
    driver: bridge
